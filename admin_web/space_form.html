<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tambah Bilik Baru</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <link rel="stylesheet" href="css/admin-dashboard.css" /> <!-- .app-bar -->
  <link rel="stylesheet" href="css/announcement-form.css" /> <!-- .form-field -->
  <link rel="stylesheet" href="css/space-form.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <header class="app-bar">
    <button class="app-bar__menu-btn" onclick="window.location.href='space_management.html'" aria-label="Kembali">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <span class="app-bar__title" id="form-title-heading">Tambah Bilik Baru</span>
  </header>

  <main class="form-content">

    <p class="form-section-label">Gambar Bilik (boleh lebih dari satu)</p>
    <div class="image-strip" id="image-strip"></div>
    <input type="file" id="image-file-input" accept="image/*" multiple style="display:none;" />

    <div class="form-field">
      <label for="name-input">Nama Bilik</label>
      <input type="text" id="name-input" />
    </div>

    <div class="form-field">
      <label for="capacity-input">Kapasiti (cth: 70 - 80 pax)</label>
      <input type="text" id="capacity-input" />
    </div>

    <div class="form-field">
      <label for="facilities-input">Kemudahan</label>
      <textarea id="facilities-input" rows="2"></textarea>
    </div>

    <div class="form-field">
      <label for="description-input">Penerangan (Pilihan)</label>
      <textarea id="description-input" rows="2"></textarea>
    </div>

    <p class="form-section-label" style="margin-top: 20px;">Kadar Harga (RM)</p>
    <p class="rate-hint">Kosongkan/0 kalau kategori tu "Tiada Caj" atau "Kakitangan Sahaja"</p>

    <p class="rate-category-label upsi">UPSI</p>
    <div class="rate-row">
      <div class="form-field">
        <label for="rate-upsi-half">Half Day</label>
        <input type="number" step="0.01" id="rate-upsi-half" />
      </div>
      <div class="form-field">
        <label for="rate-upsi-full">Full Day</label>
        <input type="number" step="0.01" id="rate-upsi-full" />
      </div>
    </div>

    <p class="rate-category-label agensi">Agensi</p>
    <div class="rate-row">
      <div class="form-field">
        <label for="rate-agensi-half">Half Day</label>
        <input type="number" step="0.01" id="rate-agensi-half" />
      </div>
      <div class="form-field">
        <label for="rate-agensi-full">Full Day</label>
        <input type="number" step="0.01" id="rate-agensi-full" />
      </div>
    </div>

    <p class="rate-category-label swasta">Swasta</p>
    <div class="rate-row">
      <div class="form-field">
        <label for="rate-swasta-half">Half Day</label>
        <input type="number" step="0.01" id="rate-swasta-half" />
      </div>
      <div class="form-field">
        <label for="rate-swasta-full">Full Day</label>
        <input type="number" step="0.01" id="rate-swasta-full" />
      </div>
    </div>

    <button class="submit-btn" id="submit-btn">
      <span id="submit-btn-label">Tambah Bilik</span>
      <div class="spinner" id="submit-spinner" style="display:none;"></div>
    </button>

  </main>

  <script src="js/supabase-client.js"></script>
  <script src="js/space-form.js"></script>

</body>
</html>
