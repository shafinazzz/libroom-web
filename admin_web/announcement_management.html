<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Announcement Management</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <link rel="stylesheet" href="css/admin-bottom-nav.css" />
  <link rel="stylesheet" href="css/admin-drawer.css" />
  <link rel="stylesheet" href="css/admin-dashboard.css" /> <!-- guna .app-bar, .loading-center, .spinner -->
  <link rel="stylesheet" href="css/announcement-management.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- AppBar -->
  <header class="app-bar">
    <button class="app-bar__menu-btn" id="drawer-menu-btn" aria-label="Menu">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <span class="app-bar__title">Announcement Management</span>
  </header>

  <!-- Loading state -->
  <div class="loading-center" id="loading-state">
    <div class="spinner"></div>
  </div>

  <!-- Body -->
  <main class="page-content" id="page-body" style="display: none;">

    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-card__icon-circle" style="background:rgba(103,80,164,0.15);">
          <span class="material-symbols-outlined" style="color:#6750A4;">campaign</span>
        </div>
        <div>
          <p class="stat-card__value" id="stat-total">0</p>
          <p class="stat-card__label">Total</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon-circle" style="background:rgba(76,175,80,0.15);">
          <span class="material-symbols-outlined" style="color:#4CAF50;">check_circle</span>
        </div>
        <div>
          <p class="stat-card__value" id="stat-active">0</p>
          <p class="stat-card__label">Active</p>
        </div>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-card__icon-circle" style="background:rgba(255,152,0,0.15);">
          <span class="material-symbols-outlined" style="color:#FF9800;">schedule</span>
        </div>
        <div>
          <p class="stat-card__value" id="stat-scheduled">0</p>
          <p class="stat-card__label">Scheduled</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon-circle" style="background:rgba(158,158,158,0.15);">
          <span class="material-symbols-outlined" style="color:#9E9E9E;">event_busy</span>
        </div>
        <div>
          <p class="stat-card__value" id="stat-expired">0</p>
          <p class="stat-card__label">Expired</p>
        </div>
      </div>
    </div>

    <div id="announcement-list" style="margin-top: 20px;"></div>

  </main>

  <!-- FAB -->
  <button class="fab" id="fab-add-btn" aria-label="Tambah pengumuman">
    <span class="material-symbols-outlined">add</span>
  </button>

  <!-- Modal: confirm delete -->
  <div class="modal-overlay" id="delete-modal-overlay">
    <div class="modal-box modal-box--confirm">
      <h3>Padam Pengumuman</h3>
      <p id="delete-confirm-text"></p>
      <div class="modal-actions">
        <button id="delete-cancel-btn">Batal</button>
        <button id="delete-confirm-btn" style="color:#f44336;">Padam</button>
      </div>
    </div>
  </div>

  <!-- Bottom nav & drawer -->
  <div id="bottom-nav-container"></div>
  <div id="drawer-container"></div>

  <script src="js/supabase-client.js"></script>
  <script src="js/pending-booking-notifier.js"></script>
  <script src="js/admin-bottom-nav.js"></script>
  <script src="js/admin-drawer.js"></script>
  <script src="js/announcement-management.js"></script>

</body>
</html>
