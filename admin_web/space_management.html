<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Management</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <link rel="stylesheet" href="css/admin-bottom-nav.css" />
  <link rel="stylesheet" href="css/admin-drawer.css" /> <!-- .modal-overlay, .modal-box -->
  <link rel="stylesheet" href="css/admin-dashboard.css" /> <!-- .app-bar, .loading-center, .spinner -->
  <link rel="stylesheet" href="css/announcement-management.css" /> <!-- .fab, .page-content -->
  <link rel="stylesheet" href="css/space-management.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <header class="app-bar">
    <button class="app-bar__menu-btn" id="drawer-menu-btn" aria-label="Menu">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <span class="app-bar__title">Space Management</span>
  </header>

  <div class="loading-center" id="loading-state">
    <div class="spinner"></div>
  </div>

  <main class="page-content" id="page-body" style="display: none;">
    <div id="space-list"></div>
  </main>

  <button class="fab" id="fab-add-btn" aria-label="Tambah bilik">
    <span class="material-symbols-outlined">add</span>
  </button>

  <!-- Modal: confirm delete -->
  <div class="modal-overlay" id="space-delete-modal-overlay">
    <div class="modal-box modal-box--confirm">
      <h3>Padam Bilik</h3>
      <p id="space-delete-text"></p>
      <div class="modal-actions">
        <button id="space-delete-cancel-btn">Batal</button>
        <button id="space-delete-confirm-btn" style="color:#f44336;">Padam</button>
      </div>
    </div>
  </div>

  <div id="bottom-nav-container"></div>
  <div id="drawer-container"></div>

  <script src="js/supabase-client.js"></script>
  <script src="js/pending-booking-notifier.js"></script>
  <script src="js/admin-bottom-nav.js"></script>
  <script src="js/admin-drawer.js"></script>
  <script src="js/space-management.js"></script>

</body>
</html>
