<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservation Management</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <link rel="stylesheet" href="css/admin-bottom-nav.css" />
  <link rel="stylesheet" href="css/admin-drawer.css" /> <!-- .modal-overlay, .modal-box, icon-btn -->
  <link rel="stylesheet" href="css/admin-dashboard.css" /> <!-- .app-bar, .loading-center, .spinner, .status-* -->
  <link rel="stylesheet" href="css/announcement-management.css" /> <!-- .icon-btn -->
  <link rel="stylesheet" href="css/booking-detail-dialog.css" />
  <link rel="stylesheet" href="css/toast.css" />
  <link rel="stylesheet" href="css/reservation-management.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

  <header class="app-bar">
    <button class="app-bar__menu-btn" id="drawer-menu-btn" aria-label="Menu">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <span class="app-bar__title">Reservation Management</span>
    <button class="app-bar__pdf-btn" id="pdf-report-btn" aria-label="Generate Laporan PDF" title="Generate Laporan PDF">
      <span class="material-symbols-outlined">picture_as_pdf</span>
    </button>
  </header>

  <div class="loading-center" id="loading-state">
    <div class="spinner"></div>
  </div>

  <main class="page-content" id="page-body" style="display: none;">
    <div id="reservation-list"></div>
  </main>

  <!-- Modal: confirm delete booking -->
  <div class="modal-overlay" id="booking-delete-modal-overlay">
    <div class="modal-box modal-box--confirm">
      <h3>Padam Tempahan</h3>
      <p id="booking-delete-text"></p>
      <div class="modal-actions">
        <button id="booking-delete-cancel-btn">Batal</button>
        <button id="booking-delete-confirm-btn" style="color:#f44336;">Padam</button>
      </div>
    </div>
  </div>

  <!-- Modal: edit booking (isi dijana oleh JS) -->
  <div class="modal-overlay" id="edit-booking-modal-overlay"></div>

  <!-- Modal: generate report (isi dijana oleh JS) -->
  <div class="modal-overlay" id="report-modal-overlay"></div>

  <div id="bottom-nav-container"></div>
  <div id="drawer-container"></div>

  <script src="js/supabase-client.js"></script>
  <script src="js/pending-booking-notifier.js"></script>
  <script src="js/admin-bottom-nav.js"></script>
  <script src="js/admin-drawer.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/booking-notifier.js"></script>
  <script src="js/booking-detail-dialog.js"></script>
  <script src="js/report-generator.js"></script>
  <script src="js/reservation-management.js"></script>

</body>
</html>
