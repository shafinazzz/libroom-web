<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Libroom Admin Panel</title>

  <!-- Google Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <link rel="stylesheet" href="css/admin-bottom-nav.css" />
  <link rel="stylesheet" href="css/admin-dashboard.css" />
  <link rel="stylesheet" href="css/admin-drawer.css" />
  <link rel="stylesheet" href="css/toast.css" />

  <!-- Chart.js — padanan fl_chart -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <!-- Supabase JS client — padanan supabase_flutter -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- AppBar — padanan Scaffold.appBar -->
  <header class="app-bar">
    <button class="app-bar__menu-btn" id="drawer-menu-btn" aria-label="Menu">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <span class="app-bar__title">Libroom Admin Panel</span>
    <button class="app-bar__refresh-btn" id="refresh-btn" aria-label="Refresh">
      <span class="material-symbols-outlined">refresh</span>
    </button>
  </header>

  <!-- Loading state — padanan CircularProgressIndicator -->
  <div class="loading-center" id="loading-state">
    <div class="spinner"></div>
  </div>

  <!-- Body content — padanan ListView -->
  <main class="dashboard-content" id="dashboard-body" style="display: none;">

    <!-- Stat cards row 1 -->
    <div class="stat-row">
      <div class="stat-card">
        <span class="material-symbols-outlined stat-card__icon" style="color:#1E88E5;">people</span>
        <div class="stat-card__value" id="stat-users">0</div>
        <div class="stat-card__label">Users</div>
      </div>
      <div class="stat-card">
        <span class="material-symbols-outlined stat-card__icon" style="color:#43A047;">event_available</span>
        <div class="stat-card__value" id="stat-booking">0</div>
        <div class="stat-card__label">Booking</div>
      </div>
    </div>

    <!-- Stat cards row 2 -->
    <div class="stat-row">
      <div class="stat-card">
        <span class="material-symbols-outlined stat-card__icon" style="color:#8E24AA;">meeting_room</span>
        <div class="stat-card__value" id="stat-rooms">0</div>
        <div class="stat-card__label">Rooms</div>
      </div>
      <div class="stat-card">
        <span class="material-symbols-outlined stat-card__icon" style="color:#EF6C00;">payments</span>
        <div class="stat-card__value" id="stat-revenue">RM 0</div>
        <div class="stat-card__label">Revenue</div>
      </div>
    </div>

    <!-- Chart -->
    <h2 class="section-title">Booking Chart (Tahun Ini)</h2>
    <div class="chart-container">
      <canvas id="booking-chart"></canvas>
    </div>

    <!-- Recent bookings -->
    <h2 class="section-title">Recent Reservations</h2>
    <div id="recent-bookings-list"></div>

  </main>

  <!-- Bottom nav -->
  <div id="bottom-nav-container"></div>

  <!-- Drawer (overlay + panel + modal-modal dimasukkan oleh JS) -->
  <div id="drawer-container"></div>

  <script src="js/supabase-client.js"></script>
  <script src="js/pending-booking-notifier.js"></script>
  <script src="js/admin-bottom-nav.js"></script>
  <script src="js/admin-drawer.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/booking-notifier.js"></script>
  <script src="js/admin-dashboard.js"></script>

</body>
</html>
