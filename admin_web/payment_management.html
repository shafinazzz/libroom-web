<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Management</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <link rel="stylesheet" href="css/admin-bottom-nav.css" />
  <link rel="stylesheet" href="css/admin-drawer.css" />
  <link rel="stylesheet" href="css/admin-dashboard.css" /> <!-- .app-bar, .loading-center, .spinner, .status-* -->
  <link rel="stylesheet" href="css/announcement-management.css" /> <!-- .stat-row, .stat-card -->
  <link rel="stylesheet" href="css/payment-management.css" />
  <link rel="stylesheet" href="css/booking-detail-dialog.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <header class="app-bar">
    <button class="app-bar__menu-btn" id="drawer-menu-btn" aria-label="Menu">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <span class="app-bar__title">Payment Management</span>
  </header>

  <div class="loading-center" id="loading-state">
    <div class="spinner"></div>
  </div>

  <main class="page-content" id="page-body" style="display: none;">

    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-card__icon-circle" style="background:rgba(103,80,164,0.15);">
          <span class="material-symbols-outlined" style="color:#6750A4;">account_balance_wallet</span>
        </div>
        <div>
          <p class="stat-card__value" id="stat-total">0</p>
          <p class="stat-card__label">Total Payments</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon-circle" style="background:rgba(76,175,80,0.15);">
          <span class="material-symbols-outlined" style="color:#4CAF50;">check_circle</span>
        </div>
        <div>
          <p class="stat-card__value" id="stat-paid">0</p>
          <p class="stat-card__label">Paid</p>
        </div>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-card__icon-circle" style="background:rgba(255,152,0,0.15);">
          <span class="material-symbols-outlined" style="color:#FF9800;">schedule</span>
        </div>
        <div>
          <p class="stat-card__value" id="stat-pending">0</p>
          <p class="stat-card__label">Pending</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon-circle" style="background:rgba(244,67,54,0.15);">
          <span class="material-symbols-outlined" style="color:#F44336;">cancel</span>
        </div>
        <div>
          <p class="stat-card__value" id="stat-rejected">0</p>
          <p class="stat-card__label">Rejected</p>
        </div>
      </div>
    </div>

    <div id="payment-list" style="margin-top: 20px;"></div>

  </main>

  <div id="bottom-nav-container"></div>
  <div id="drawer-container"></div>

  <script src="js/supabase-client.js"></script>
  <script src="js/pending-booking-notifier.js"></script>
  <script src="js/admin-bottom-nav.js"></script>
  <script src="js/admin-drawer.js"></script>
  <script src="js/booking-detail-dialog.js"></script>
  <script src="js/payment-management.js"></script>

</body>
</html>
