<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library Spaces Catalog</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <link rel="stylesheet" href="css/spaces.css" />
  <link rel="stylesheet" href="css/app-bottom-nav.css" />
  <link rel="stylesheet" href="css/modal.css" />
  <link rel="stylesheet" href="css/user-drawer.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <header class="app-bar">
    <button class="app-bar__menu-btn" id="drawer-menu-btn" aria-label="Menu">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <span class="app-bar__title">Library Spaces Catalog</span>
  </header>

  <div class="loading-center" id="loading-state">
    <div class="spinner"></div>
  </div>

  <main id="page-body" style="display:none;">
    <div class="spaces-grid" id="spaces-grid"></div>
  </main>

  <!-- Lightbox image viewer -->
  <div class="lightbox-overlay" id="lightbox-overlay">
    <div class="lightbox-content">
      <button class="lightbox-close-btn" id="lightbox-close-btn" aria-label="Tutup">
        <span class="material-symbols-outlined">close</span>
      </button>
      <button class="lightbox-nav-btn lightbox-nav-btn--prev" id="lightbox-prev-btn" aria-label="Sebelum">
        <span class="material-symbols-outlined">chevron_left</span>
      </button>
      <div class="lightbox-img-wrap">
        <img id="lightbox-img" src="" alt="Gambar bilik" />
      </div>
      <button class="lightbox-nav-btn lightbox-nav-btn--next" id="lightbox-next-btn" aria-label="Seterusnya">
        <span class="material-symbols-outlined">chevron_right</span>
      </button>
      <p class="lightbox-counter" id="lightbox-counter"></p>
    </div>
  </div>

  <div id="bottom-nav-container"></div>
  <div id="drawer-container"></div>

  <script src="js/supabase-client.js"></script>
  <script src="js/app-bottom-nav.js"></script>
  <script src="js/user-drawer.js"></script>
  <script src="js/spaces.js"></script>

</body>
</html>
