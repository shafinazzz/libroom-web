<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tempahan Dihantar</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <link rel="stylesheet" href="css/booking-success.css" />
</head>
<body>

  <main class="success-content">
    <div class="success-icon-circle">
      <span class="material-symbols-outlined">check</span>
    </div>

    <h1 class="success-title">Tempahan Dihantar!</h1>
    <p class="success-desc" id="success-desc">Ruang telah dihantar untuk kelulusan pustakawan.</p>

    <div class="success-ref-box">
      <span class="success-ref-box__label">No. Rujukan</span>
      <span class="success-ref-box__value" id="success-ref-value">-</span>
    </div>

    <button class="success-btn success-btn--primary" id="view-bookings-btn">Lihat Tempahan Saya</button>
    <button class="success-btn success-btn--outline" id="home-btn">Laman Utama</button>
  </main>

  <script src="js/booking-success.js"></script>

</body>
</html>
