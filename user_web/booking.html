<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peti Tempahan Saya</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <link rel="stylesheet" href="css/modal.css" />
  <link rel="stylesheet" href="css/booking.css" />
  <link rel="stylesheet" href="css/app-bottom-nav.css" />
  <link rel="stylesheet" href="css/user-drawer.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- AppBar (hamburger -> UserDrawer, belum lengkap sampai user_drawer.dart dipaste) -->
  <header class="app-bar">
    <button class="app-bar__menu-btn" id="drawer-menu-btn" aria-label="Menu">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <span class="app-bar__title">Peti Tempahan Saya</span>
  </header>

  <main class="cart-content">
    <div id="cart-list"></div>
  </main>

  <!-- Footer: total + butang teruskan -->
  <div class="cart-footer" id="cart-footer" style="display:none;">
    <div class="cart-footer__inner">
      <div class="cart-footer__row">
        <span id="cart-count-label">Jumlah Keseluruhan (0 Ruang):</span>
        <span class="cart-footer__total" id="cart-total-value">RM 0.00</span>
      </div>
      <button class="cart-footer__continue-btn" id="continue-payment-btn">Teruskan Ke Pembayaran</button>
    </div>
  </div>

  <!-- Modal: edit item (isi dijana JS) -->
  <div class="modal-overlay" id="edit-item-modal-overlay"></div>

  <div id="bottom-nav-container"></div>
  <div id="drawer-container"></div>

  <script src="js/supabase-client.js"></script>
  <script src="js/cart-manager.js"></script>
  <script src="js/app-bottom-nav.js"></script>
  <script src="js/user-drawer.js"></script>
  <script src="js/booking-page.js"></script>

</body>
</html>
