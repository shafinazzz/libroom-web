<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tuanku Bainun Library</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <link rel="stylesheet" href="css/user-dashboard.css" />
  <link rel="stylesheet" href="css/app-bottom-nav.css" />
  <link rel="stylesheet" href="css/modal.css" />
  <link rel="stylesheet" href="css/user-drawer.css" />
  <link rel="stylesheet" href="css/announcement-popup.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <header class="app-bar">
    <button class="app-bar__menu-btn" id="drawer-menu-btn" aria-label="Menu">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <span class="app-bar__title">Tuanku Bainun Library</span>
    <button class="app-bar__cart-btn" id="cart-btn" aria-label="Cart">
      <span class="material-symbols-outlined">shopping_bag</span>
      <span class="app-bar__cart-badge" id="cart-badge" style="display:none;">0</span>
    </button>
  </header>

  <main class="dashboard-content">

    <!-- Welcome banner -->
    <div class="welcome-banner">
      <h1>Welcome to Libroom</h1>
      <p>Book your discussion rooms, auditoriums, and study spaces easily.</p>
    </div>

    <!-- Find a Space -->
    <div class="find-space-card">
      <p class="find-space-card__heading">Find a Space</p>

      <!-- Date -->
      <div class="filter-row filter-row--clickable" id="date-filter-row">
        <div class="filter-row__left">
          <span class="material-symbols-outlined">calendar_today</span>
          <div>
            <p class="filter-row__label">Date</p>
            <p class="filter-row__value" id="date-value-display">-</p>
          </div>
        </div>
        <span class="material-symbols-outlined">edit_calendar</span>
      </div>
      <input type="date" id="date-input" />

      <!-- Category (guest -> dropdown, upsi -> label je) -->
      <div class="filter-row" id="category-filter-guest" style="display:none;">
        <div class="filter-row__left">
          <span class="material-symbols-outlined">category</span>
          <p class="filter-row__label">Category</p>
        </div>
        <select id="guest-category-select">
          <option value="">Pilih Kategori</option>
          <option value="agensi">Agensi</option>
          <option value="swasta">Swasta</option>
        </select>
      </div>

      <div class="filter-row" id="category-filter-upsi" style="display:none;">
        <div class="filter-row__left">
          <span class="material-symbols-outlined">category</span>
          <div>
            <p class="filter-row__label">Category</p>
            <p class="filter-row__value" id="category-upsi-display">UPSI Staff/Student</p>
          </div>
        </div>
      </div>

      <!-- Duration -->
      <div class="filter-row">
        <div class="filter-row__left">
          <span class="material-symbols-outlined">access_time</span>
          <p class="filter-row__label">Duration</p>
        </div>
        <select id="session-select">
          <option value="Half Day">Half Day</option>
          <option value="Full Day">Full Day</option>
        </select>
      </div>

      <button class="search-btn" id="search-btn">
        <span id="search-btn-label">Search Spaces</span>
        <div class="spinner" id="search-btn-spinner" style="display:none; width:20px; height:20px; border-width:2px; border-color:rgba(255,255,255,0.4); border-top-color:#fff;"></div>
      </button>
    </div>

    <!-- Available Spaces -->
    <p class="section-heading">Available Spaces</p>
    <div class="space-loading" id="space-loading">
      <div class="spinner" style="width:32px;height:32px;border-width:3px;border-color:#d9d0ff;border-top-color:#0a2540;margin:0 auto;"></div>
    </div>
    <div id="space-results" style="display:none;"></div>

  </main>

  <!-- Bottom sheet: space detail (isi dijana JS) -->
  <div class="sheet-overlay" id="sheet-overlay"></div>

  <div id="bottom-nav-container"></div>
  <div id="drawer-container"></div>

  <script src="js/supabase-client.js"></script>
  <script src="js/cart-manager.js"></script>
  <script src="js/app-bottom-nav.js"></script>
  <script src="js/user-drawer.js"></script>
  <script src="js/announcement-popup.js"></script>
  <script src="js/user-dashboard.js"></script>

</body>
</html>
